name: Update versions.json

on:
  push:
    branches: [main]
    paths:
      - 'projects/**'

permissions:
  contents: write

jobs:
  update-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate versions.json
        run: |
          python3 - <<'EOF'
          import os, json
          from datetime import datetime, timezone

          products = {}
          projects_dir = "projects"

          if os.path.isdir(projects_dir):
            for project_folder in sorted(os.listdir(projects_dir)):
              project_path = os.path.join(projects_dir, project_folder)
              config_file = os.path.join(project_path, "project.json")

              if not os.path.isdir(project_path) or not os.path.isfile(config_file):
                continue

              with open(config_file, "r") as f:
                config = json.load(f)

              project_id = config["id"]
              entry = {
                "name":        config.get("name", project_folder),
                "chip":        config.get("chip", ""),
                "repoOwner":   config.get("repoOwner", ""),
                "repoName":    config.get("repoName", ""),
                "projectPath": config.get("projectPath", f"projects/{project_folder}"),
                "binPrefix":   config.get("binPrefix", ""),
                "stable": [],
                "beta": []
              }

              for channel in ["stable", "beta"]:
                channel_path = os.path.join(project_path, channel)
                if os.path.isdir(channel_path):
                  versions = sorted(
                    [d for d in os.listdir(channel_path)
                     if os.path.isdir(os.path.join(channel_path, d))
                     and d.startswith("v")
                     and os.path.isfile(os.path.join(channel_path, d, "merged_flash.bin"))],
                    reverse=True
                  )
                  entry[channel] = versions

              products[project_id] = entry

          output = {
            "products": products,
            "generated": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          }

          with open("versions.json", "w") as f:
            json.dump(output, f, indent=2, ensure_ascii=False)
            f.write("\n")

          print("Generated versions.json:")
          print(json.dumps(output, indent=2))
          EOF

      - name: Commit versions.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add versions.json
          git diff --cached --quiet || git commit -m "chore: auto-update versions.json [skip ci]"
          git push

